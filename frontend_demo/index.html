<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>See&Say</title>

  <script>
    (function () {
      // Set language from URL
      try {
        const params = new URLSearchParams(window.location.search);
        const lang = (params.get("lang") || "he").toLowerCase();
        const normalized = lang === "en" ? "en" : "he";
        document.documentElement.lang = normalized;
        document.documentElement.dir = normalized === "he" ? "rtl" : "ltr";
      } catch (e) {
        document.documentElement.lang = "he";
        document.documentElement.dir = "rtl";
      }

      // Auto-busting version — changes on every page load, no manual updates needed
      window._v = Date.now();

      // Inject CSS with fresh version
      ["css/colors.css", "css/styles.css"].forEach(function (href) {
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href + "?v=" + window._v;
        document.head.appendChild(link);
      });
    })();
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- LameJS for MP3 encoding -->
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <!-- Components — version injected automatically via window._v -->
  <script>
    (function () {
      var v = window._v;
      var files = [
        "recording.js",
        "i18n.js",
        "navbar.js",
        "test.js",
        "help.js",
        "app.js",
        "welcome.js",
        "loader.js",
        "apiToMongo.js"
      ];
      files.forEach(function (file) {
        document.write('<scr' + 'ipt type="text/babel" src="./' + file + '?v=' + v + '"><\/scr' + 'ipt>');
      });
    })();
  </script>
</body>

</html>
