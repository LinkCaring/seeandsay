<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>MILI</title>

  <script>
    (function () {
      // Set language from URL
      try {
        const params = new URLSearchParams(window.location.search);
        const lang = (params.get("lang") || "he").toLowerCase();
        const normalized = lang === "en" ? "en" : "he";
        document.documentElement.lang = normalized;
        document.documentElement.dir = normalized === "he" ? "rtl" : "ltr";
      } catch (e) {
        document.documentElement.lang = "he";
        document.documentElement.dir = "rtl";
      }

      // Auto-busting version — changes on every page load, no manual updates needed
      window._v = Date.now();

      // Inject CSS with fresh version
      ["css/colors.css", "css/styles.css"].forEach(function (href) {
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href + "?v=" + window._v;
        document.head.appendChild(link);
      });
    })();
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- LameJS for MP3 encoding -->
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>

  <!-- Load order matters — paths relative to frontend_demo/ (index.html) -->
  <script>
    (function () {
      var v = window._v;
      var files = [
        "expressionTiming.js",
        "js/core/i18n.js",
        "js/record_session/recordingTimestamps.js",
        "js/record_session/recordingCapture.js",
        "js/record_session/recordingEncode.js",
        "js/record_session/expressionSegmentRecorder.js",
        "recording.js",
        "js/core/loader.js",
        "js/api/apiToMongo.js",
        "js/components/navbar.js",
        "js/components/help.js",
        "js/test/utils/testConstants.js",
        "js/test/utils/testAvatarVideo.js",
        "js/test/utils/testAgeUtils.js",
        "js/test/utils/testQuestionUtils.js",
        "js/test/flow/testExpressionTimers.js",
        "js/test/flow/testMicIntro.js",
        "js/test/flow/testStartScreens.js",
        "js/test/flow/testQuestionFlow.js",
        "js/test/expression/segmentBlobVault.js",
        "js/test/expression/expressionSegmentUploadQueue.js",
        "js/test/scoring/testScoring.js",
        "js/test/ui/testPauseAfk.js",
        "js/test/finish/testSessionFinish.js",
        "js/test/finish/testExpressionAiPoll.js",
        "js/test/ui/testOverlays.js",
        "js/test/ui/testQuestionRender.js",
        "js/test/ui/expressionAiReportShared.js",
        "js/test/ui/testSummaryRender.js",
        "js/test/test.js",
        "js/app/resultsView.js",
        "js/app/app.js",
        "js/app/welcomeShared.js",
        "js/app/welcomeLogin.js",
        "js/app/welcomeScreens.js",
        "js/app/welcome.js"
      ];
      files.forEach(function (file) {
        document.write('<scr' + 'ipt type="text/babel" src="./' + file + '?v=' + v + '"><\/scr' + 'ipt>');
      });
    })();
  </script>
</body>

</html>
